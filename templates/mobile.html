<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑜伽馆管理系统 - 手机入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .qrcode-area {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .url-box {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            word-break: break-all;
            font-size: 13px;
            color: #555;
            cursor: pointer;
        }
        .url-box:hover { background: #e8e8e8; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .tips {
            margin-top: 24px;
            text-align: left;
            font-size: 13px;
            color: #888;
            line-height: 1.8;
        }
        .tips li { margin-bottom: 4px; }
        .local-addr {
            margin-top: 16px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧘 瑜伽馆管理系统</h1>
        <p class="subtitle">手机扫码或点击下方按钮直接访问</p>
        
        <div class="qrcode-area" id="qrcode"></div>
        
        <div class="url-box" id="urlBox" onclick="copyUrl()">
            <span id="urlText">加载中...</span>
        </div>
        <p style="font-size:12px;color:#aaa;margin-bottom:16px;">点击地址可复制</p>
        
        <a id="openBtn" href="#" class="btn" target="_blank">📱 打开系统</a>
        
        <ul class="tips">
            <li>💡 <strong>添加到桌面</strong>：在浏览器菜单选择「添加到主屏幕」</li>
            <li>💡 <strong>局域网地址</strong>：手机和电脑需在同一个 WiFi 下</li>
            <li>💡 <strong>地址变化</strong>：重启后公网地址会变化，请重新访问本页面</li>
        </ul>
        
        <div class="local-addr">
            <p>局域网地址：<span id="localAddr">-</span></p>
        </div>
    </div>

    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // 获取公网地址
        fetch('/api/tunnel-url')
            .then(r => r.json())
            .then(data => {
                const url = data.url || data.tunnel_url || window.location.origin;
                showUrl(url);
            })
            .catch(() => {
                // 如果 API 不存在，用当前地址
                showUrl(window.location.origin);
            });
        
        function showUrl(url) {
            document.getElementById('urlText').textContent = url;
            document.getElementById('openBtn').href = url;
            
            // 生成二维码
            try {
                new QRCode(document.getElementById('qrcode'), {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark: '#333',
                    colorLight: '#fff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch(e) {}
        }
        
        function copyUrl() {
            const url = document.getElementById('urlText').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const box = document.getElementById('urlBox');
                const orig = box.style.background;
                box.style.background = '#d4edda';
                setTimeout(() => box.style.background = orig, 1000);
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
            });
        }
    </script>
</body>
</html>
