<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 瑜伽馆管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .card-custom {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .card-header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .card-header p { opacity: 0.9; font-size: 14px; }
        .card-body { padding: 40px 30px; }
        .form-floating { margin-bottom: 20px; }
        .form-floating input {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-floating input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-floating label { padding: 16px; color: #888; }
        .btn-primary {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .card-footer {
            text-align: center;
            padding: 20px 30px 30px;
            color: #888;
            font-size: 14px;
        }
        .card-footer a { color: #667eea; text-decoration: none; font-weight: 600; }
        .card-footer a:hover { text-decoration: underline; }
        .alert { border-radius: 10px; margin-bottom: 20px; }
        .password-hint { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 10px; }
        .icon-big { font-size: 48px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card-custom">
        <div class="card-header">
            <div class="icon-big">🔐</div>
            <h1>重置密码</h1>
            <p>请设置您的新密码</p>
        </div>

        <div class="card-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="新密码" required minlength="6" autofocus>
                    <label for="password">🔒 新密码</label>
                </div>
                <p class="password-hint">密码至少6位</p>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password2" name="password2"
                           placeholder="确认新密码" required>
                    <label for="password2">🔒 确认新密码</label>
                </div>

                <button type="submit" class="btn btn-primary">重置密码</button>
            </form>
        </div>

        <div class="card-footer">
            <a href="{{ url_for('login') }}">← 返回登录</a>
        </div>
    </div>
</body>
</html>
